version: '3.8'

services:
  neurograph-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
    volumes:
      - ./neurograph.json:/app/neurograph.json
    restart: unless-stopped

  neurograph-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - neurograph-backend
    environment:
      - VITE_API_URL=http://localhost:5000
    restart: unless-stopped

networks:
  default:
    name: neurograph-network

